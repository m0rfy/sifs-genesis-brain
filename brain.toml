# Brain config for CPU brain (sifs_genesis_hybrid) — контракт A.4, BRAIN_CONTRACT.
# Бинарник пока может не читать TOML; значения по умолчанию в BrainConfig.

[brain]
n_neurons = 1000
steps_per_observation = 1
